<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#1a1a1a"/>
  
  <!-- Outer Decorative Circle -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.8"/>
  <circle cx="150" cy="150" r="135" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Inner Circle -->
  <circle cx="150" cy="150" r="120" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- Decorative Horizontal Lines -->
  <line x1="50" y1="80" x2="250" y2="80" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="220" x2="250" y2="220" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Vertical Accent Lines -->
  <line x1="100" y1="60" x2="100" y2="240" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="200" y1="60" x2="200" y2="240" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Main Text: TG -->
  <g filter="url(#shadow)">
    <text x="150" y="170" font-family="'Times New Roman', Georgia, serif" font-size="120" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="5">TG</text>
  </g>
  
  <!-- Luxury Banner Below -->
  <rect x="60" y="190" width="180" height="40" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" rx="5"/>
  <text x="150" y="218" font-family="'Times New Roman', Georgia, serif" font-size="18" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">LUXURY</text>
  
  <!-- Corner Diamonds -->
  <g fill="url(#goldGrad)">
    <polygon points="55,55 60,50 65,55 60,60"/>
    <polygon points="245,55 250,50 255,55 250,60"/>
    <polygon points="55,245 60,240 65,245 60,250"/>
    <polygon points="245,245 250,240 255,245 250,250"/>
  </g>
  
  <!-- Decorative Stars/Sparkles -->
  <g fill="url(#goldGrad)" opacity="0.7">
    <circle cx="80" cy="100" r="2"/>
    <circle cx="220" cy="100" r="2"/>
    <circle cx="80" cy="200" r="2"/>
    <circle cx="220" cy="200" r="2"/>
  </g>
</svg>
