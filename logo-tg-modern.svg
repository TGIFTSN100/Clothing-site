<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modernGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Geometric Background Shape -->
  <polygon points="0,0 200,0 200,200 0,200" fill="none"/>
  
  <!-- Modern Square Border -->
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#000" stroke-width="2" rx="4"/>
  <rect x="25" y="25" width="150" height="150" fill="none" stroke="url(#modernGold)" stroke-width="1"/>
  
  <!-- Main Letters with Modern Style -->
  <g>
    <!-- T -->
    <rect x="50" y="40" width="40" height="6" fill="url(#modernGold)"/>
    <rect x="60" y="46" width="20" height="70" fill="url(#modernGold)"/>
    
    <!-- G -->
    <path d="M 110 50 Q 130 50 130 80 L 130 130 Q 130 150 110 150 Q 90 150 90 130 L 90 100 L 120 100" 
          fill="none" stroke="url(#modernGold)" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000" text-anchor="middle" letter-spacing="2">LUXURY</text>
  
  <!-- Accent Dots -->
  <circle cx="40" cy="40" r="2" fill="url(#modernGold)"/>
  <circle cx="160" cy="40" r="2" fill="url(#modernGold)"/>
  <circle cx="40" cy="160" r="2" fill="url(#modernGold)"/>
  <circle cx="160" cy="160" r="2" fill="url(#modernGold)"/>
</svg>
