<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient effect -->
  <defs>
    <linearGradient id="luxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="url(#luxGrad)"/>
  
  <!-- Ornate Border Frame -->
  <rect x="30" y="30" width="140" height="140" fill="none" stroke="#8b7355" stroke-width="2"/>
  <rect x="35" y="35" width="130" height="130" fill="none" stroke="#8b7355" stroke-width="1" opacity="0.5"/>
  
  <!-- Corner Flourishes -->
  <circle cx="40" cy="40" r="3" fill="#8b7355"/>
  <circle cx="160" cy="40" r="3" fill="#8b7355"/>
  <circle cx="40" cy="160" r="3" fill="#8b7355"/>
  <circle cx="160" cy="160" r="3" fill="#8b7355"/>
  
  <!-- Script Text -->
  <text x="100" y="95" font-family="Lucida Handwriting, cursive" font-size="20" font-weight="600" text-anchor="middle" fill="#8b7355">ET</text>
  <text x="100" y="135" font-family="Georgia, serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#8b7355">LUXURIES</text>
</svg>