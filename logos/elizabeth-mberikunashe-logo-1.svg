<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#fff8f0"/>
  
  <!-- Circular Design with Cultural Elements -->
  <circle cx="100" cy="85" r="50" fill="none" stroke="#d4563f" stroke-width="2"/>
  
  <!-- Fashion Pattern - Triangular Elements (inspired by African patterns) -->
  <path d="M 80 60 L 85 75 L 90 60 Z" fill="#d4563f"/>
  <path d="M 100 50 L 105 65 L 110 50 Z" fill="#d4563f"/>
  <path d="M 120 60 L 125 75 L 130 60 Z" fill="#d4563f"/>
  
  <!-- Dress Form Silhouette -->
  <ellipse cx="100" cy="100" rx="12" ry="25" fill="#d4563f" opacity="0.7"/>
  
  <!-- Text -->
  <text x="100" y="150" font-family="Georgia, serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#d4563f" letter-spacing="1">ELIZABETH</text>
  <text x="100" y="165" font-family="Georgia, serif" font-size="9" font-weight="600" text-anchor="middle" fill="#d4563f" letter-spacing="1">MBERIKUNASHE</text>
</svg>